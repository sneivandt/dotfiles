name: CI

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ── Rust Format Check ──────────────────────────────────
  rust-fmt:
    name: "Rust: Format Check"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        run: rustup show
      - run: cargo fmt --check --manifest-path cli/Cargo.toml

  # ── Script Linting ────────────────────────────────────
  lint:
    name: "Lint: ${{ matrix.name }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: ShellCheck
            setup: sudo apt-get update && sudo apt-get install -y shellcheck
            test_function: test_shellcheck
          - name: PSScriptAnalyzer
            setup: pwsh -NoProfile -Command "Install-Module -Name PSScriptAnalyzer -Force -Scope CurrentUser"
            test_function: test_psscriptanalyzer
    steps:
      - uses: actions/checkout@v4
      - name: Install ${{ matrix.name }}
        run: ${{ matrix.setup }}
      - name: Run ${{ matrix.name }}
        run: |
          export DIR="$(pwd)"
          cd .github/workflows/scripts/linux
          sh test-static-analysis.sh ${{ matrix.test_function }}

  # ── Configuration Validation ──────────────────────────
  validate-config:
    name: "Config: Validate all"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate all config
        run: |
          export DIR="$(pwd)"
          cd .github/workflows/scripts/linux
          sh test-config.sh config_validation
          sh test-config.sh symlinks_validation
          sh test-config.sh chmod_validation
          sh test-config.sh toml_syntax
          sh test-config.sh category_consistency
          sh test-config.sh empty_sections

  # ── Security ──────────────────────────────────────────
  audit:
    name: "Security: Cargo Audit"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        run: rustup show
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "cli -> target"
      - run: cargo install cargo-audit --locked
      - run: cargo audit --file cli/Cargo.lock

  deny:
    name: "Security: Cargo Deny"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          manifest-path: cli/Cargo.toml
          command: check all
          log-level: warn

  # ── Build, Clippy & Test ──────────────────────────────
  build-linux:
    name: "Build: Linux"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        run: rustup show
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "cli -> target"
          cache-on-failure: true
      - name: Build CI binary
        run: cargo build --profile ci --manifest-path cli/Cargo.toml
      - name: Clippy
        run: cargo clippy --profile ci --manifest-path cli/Cargo.toml --all-targets -- -D warnings
      - name: Tests
        run: cargo test --profile ci --manifest-path cli/Cargo.toml
      - uses: actions/upload-artifact@v4
        with:
          name: dotfiles-linux
          path: cli/target/ci/dotfiles
          retention-days: 1

  build-windows:
    name: "Build: Windows"
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Disable Windows Defender real-time monitoring
        run: Set-MpPreference -DisableRealtimeMonitoring $true
      - name: Install Rust toolchain
        run: rustup show
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "cli -> target"
          cache-on-failure: true
      - name: Build CI binary
        run: cargo build --profile ci --manifest-path cli/Cargo.toml
      - name: Clippy
        run: cargo clippy --profile ci --manifest-path cli/Cargo.toml --all-targets -- -D warnings
      - name: Tests
        run: cargo test --profile ci --manifest-path cli/Cargo.toml
      - uses: actions/upload-artifact@v4
        with:
          name: dotfiles-windows
          path: cli/target/ci/dotfiles.exe
          retention-days: 1

  # ── Integration Tests ─────────────────────────────────
  integration-linux:
    name: "Integration: ${{ matrix.profile }} on Linux"
    runs-on: ubuntu-latest
    needs: [build-linux]
    strategy:
      fail-fast: false
      matrix:
        profile: [base, desktop]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: dotfiles-linux
          path: bin/
      - name: Make binary executable
        run: chmod +x bin/dotfiles
      - name: Dry-run install
        run: ./bin/dotfiles --root . -p ${{ matrix.profile }} -d install
      - name: Run validation
        run: ./bin/dotfiles --root . -p ${{ matrix.profile }} test

  integration-windows:
    name: "Integration: ${{ matrix.profile }} on Windows"
    runs-on: windows-latest
    needs: [build-windows]
    strategy:
      fail-fast: false
      matrix:
        profile: [base, desktop]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: dotfiles-windows
          path: bin/
      - name: Dry-run install
        shell: bash
        run: ./bin/dotfiles.exe --root . -p ${{ matrix.profile }} -d install
      - name: Run validation
        shell: bash
        run: ./bin/dotfiles.exe --root . -p ${{ matrix.profile }} test

  test-install-uninstall:
    name: "Integration: Install/Uninstall round-trip"
    runs-on: ubuntu-latest
    needs: [build-linux]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: dotfiles-linux
          path: bin/
      - name: Run install/uninstall round-trip test
        run: |
          chmod +x bin/dotfiles
          export DIR="$(pwd)" BINARY_PATH="$(pwd)/bin/dotfiles"
          cd .github/workflows/scripts/linux
          sh test-uninstall.sh

  test-install-uninstall-windows:
    name: "Integration: Install/Uninstall round-trip (Windows)"
    runs-on: windows-latest
    needs: [build-windows]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: dotfiles-windows
          path: bin/
      - name: Run install/uninstall round-trip test
        shell: pwsh
        run: |
          $env:BINARY_PATH = Join-Path $PWD "bin\dotfiles.exe"
          $env:DIR = $PWD.Path
          & .github/workflows/scripts/windows/Test-InstallUninstall.ps1

  # ── Application Tests ─────────────────────────────────
  test-applications:
    name: "App: ${{ matrix.application }}"
    runs-on: ubuntu-latest
    needs: [build-linux]
    strategy:
      fail-fast: false
      matrix:
        include:
          - application: git
            packages: git
            tests: config aliases behavior
          - application: zsh
            packages: zsh
            tests: completion
          - application: vim
            packages: vim
            tests: opens
          - application: nvim
            packages: neovim
            tests: opens plugins
    steps:
      - uses: actions/checkout@v4
      - name: Install ${{ matrix.packages }}
        run: sudo apt-get update && sudo apt-get install -y ${{ matrix.packages }}
      - uses: actions/download-artifact@v4
        with:
          name: dotfiles-linux
          path: bin/
      - name: Install dotfiles with base profile
        run: |
          chmod +x bin/dotfiles
          ./bin/dotfiles --root . -p base install -v --skip copilot-plugins
      - name: Test ${{ matrix.application }}
        run: |
          export DIR="$(pwd)"
          cd .github/workflows/scripts/linux
          sh test-applications.sh ${{ matrix.application }} ${{ matrix.tests }}

  # ── Specialized Tests ─────────────────────────────────
  test-git-hooks:
    name: "Security: Pre-commit Sensitive Data Detection"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install and test pre-commit hook
        run: |
          git config user.name "CI Test"
          git config user.email "ci@test.local"
          ln -sf "$(pwd)/hooks/pre-commit" .git/hooks/pre-commit
          chmod +x .git/hooks/pre-commit
          .github/workflows/scripts/linux/test-git-hooks.sh

  test-shell-wrapper-linux:
    name: "Shell Wrapper: Linux (dotfiles.sh)"
    runs-on: ubuntu-latest
    needs: [build-linux]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: dotfiles-linux
          path: bin/
      - name: Run shell wrapper tests
        run: |
          chmod +x bin/dotfiles
          export DIR="$(pwd)" BINARY_PATH="$(pwd)/bin/dotfiles"
          cd .github/workflows/scripts/linux
          sh test-shell-wrapper.sh

  test-shell-wrapper-windows:
    name: "Shell Wrapper: Windows (dotfiles.ps1)"
    runs-on: windows-latest
    needs: [build-windows]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: dotfiles-windows
          path: bin/
      - name: Run PowerShell wrapper tests
        shell: pwsh
        run: |
          $env:BINARY_PATH = Join-Path $PWD "bin\dotfiles.exe"
          & .github/workflows/scripts/windows/Test-ShellWrapper.ps1

  # ── CI Gate ───────────────────────────────────────────
  ci-success:
    name: "All CI Checks Passed"
    runs-on: ubuntu-latest
    if: always()
    needs:
      - rust-fmt
      - lint
      - validate-config
      - audit
      - deny
      - build-linux
      - build-windows
      - integration-linux
      - integration-windows
      - test-install-uninstall
      - test-install-uninstall-windows
      - test-applications
      - test-git-hooks
      - test-shell-wrapper-linux
      - test-shell-wrapper-windows
    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" || "${{ contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "One or more CI jobs failed or were cancelled"
            exit 1
          fi
          echo "All CI jobs passed"
