name: Release

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
    branches:
      - main

permissions:
  contents: write

jobs:
  check-ci:
    name: Check CI succeeded
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: CI passed
        run: echo "CI workflow passed, proceeding with release."

  build-linux:
    name: Build Linux ${{ matrix.arch }}
    needs: [check-ci]
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-latest
            artifact: dotfiles-linux-x86_64
          - arch: aarch64
            runner: ubuntu-24.04-arm
            artifact: dotfiles-linux-aarch64
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Install Rust toolchain
        run: rustup show

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "cli -> target"
          cache-on-failure: true

      - name: Build release binary
        run: cargo build --release --manifest-path cli/Cargo.toml
        env:
          DOTFILES_VERSION: v0.1.${{ github.run_number }}

      - name: Rename binary
        run: cp cli/target/release/dotfiles "${{ matrix.artifact }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  build-windows:
    name: Build Windows x86_64
    needs: [check-ci]
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Install Rust toolchain
        run: rustup show

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "cli -> target"
          cache-on-failure: true

      - name: Build release binary
        run: cargo build --release --manifest-path cli/Cargo.toml
        env:
          DOTFILES_VERSION: v0.1.${{ github.run_number }}

      - name: Rename binary
        run: Copy-Item cli\target\release\dotfiles.exe dotfiles-windows-x86_64.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: dotfiles-windows-x86_64
          path: dotfiles-windows-x86_64.exe

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-linux, build-windows]
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Generate version tag
        id: version
        run: |
          VERSION="v0.1.${{ github.run_number }}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Download Linux artifact
        uses: actions/download-artifact@v8
        with:
          name: dotfiles-linux-x86_64

      - name: Download Linux aarch64 artifact
        uses: actions/download-artifact@v8
        with:
          name: dotfiles-linux-aarch64

      - name: Download Windows artifact
        uses: actions/download-artifact@v8
        with:
          name: dotfiles-windows-x86_64

      - name: Generate checksums
        run: |
          sha256sum dotfiles-linux-x86_64 dotfiles-linux-aarch64 dotfiles-windows-x86_64.exe > checksums.sha256

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: ${{ steps.version.outputs.version }}
          body: |
            Automated release from push to main.
            Commit: ${{ github.event.workflow_run.head_sha }}
          files: |
            dotfiles-linux-x86_64
            dotfiles-linux-aarch64
            dotfiles-windows-x86_64.exe
            checksums.sha256
