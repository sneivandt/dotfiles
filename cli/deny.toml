# cargo-deny configuration
# https://embarkstudios.github.io/cargo-deny/

[advisories]
unmaintained = "workspace"
yanked = "deny"

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "OpenSSL",
    "Zlib",
    "BSL-1.0",
    "CC0-1.0",
    "CDLA-Permissive-2.0",
]

[bans]
multiple-versions = "deny"
wildcards = "deny"
deny = []
# Known-OK duplicate versions surfaced by transitive dependencies. Add new
# entries here only after confirming the upstream crate cannot consolidate.
skip = [
    # Transitive crates that pin a single version, blocked on upstream
    # consolidation. Re-evaluate periodically and remove when possible.
    { crate = "getrandom@0.2.17", reason = "ring still pins getrandom 0.2" },
    { crate = "getrandom@0.3.4", reason = "jobserver still pins getrandom 0.3" },
    { crate = "windows-sys@0.52.0", reason = "ring still pins windows-sys 0.52" },
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
