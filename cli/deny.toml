# cargo-deny configuration
# https://embarkstudios.github.io/cargo-deny/

[advisories]
unmaintained = "workspace"
yanked = "deny"

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "OpenSSL",
    "Zlib",
    "BSL-1.0",
    "CC0-1.0",
    "CDLA-Permissive-2.0",
]

[bans]
multiple-versions = "deny"
wildcards = "deny"
deny = []
# Known-OK duplicate versions surfaced by transitive dependencies. Add new
# entries here only after confirming the upstream crate cannot consolidate.
skip = [
    # Transitive crates that pin a single version, blocked on upstream
    # consolidation. Re-evaluate periodically and remove when possible.
    { crate = "getrandom", reason = "rand 0.8 still pulls 0.2; rand 0.9 uses 0.3" },
    { crate = "windows-sys", reason = "winreg/git2/terminal_size pin different majors" },
    { crate = "windows-targets", reason = "transitive of windows-sys" },
    { crate = "windows_aarch64_gnullvm", reason = "transitive of windows-targets" },
    { crate = "windows_aarch64_msvc", reason = "transitive of windows-targets" },
    { crate = "windows_i686_gnu", reason = "transitive of windows-targets" },
    { crate = "windows_i686_gnullvm", reason = "transitive of windows-targets" },
    { crate = "windows_i686_msvc", reason = "transitive of windows-targets" },
    { crate = "windows_x86_64_gnu", reason = "transitive of windows-targets" },
    { crate = "windows_x86_64_gnullvm", reason = "transitive of windows-targets" },
    { crate = "windows_x86_64_msvc", reason = "transitive of windows-targets" },
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
