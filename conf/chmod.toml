# File permissions to apply
# Each section represents a profile
# Format: mode and path (relative to home directory)
#
# Note: When applying mode to a directory, directories keep the requested
# access (with execute bits added where needed for traversal) while regular
# files in that tree have execute bits cleared unless they are targeted
# directly by their own chmod entry.

[linux]
permissions = [
  { mode = "600", path = "ssh/config" },
  { mode = "755", path = "config/git/ai-pr.sh" },
  { mode = "755", path = "config/zsh" },
]

[arch-desktop]
permissions = [
  { mode = "755", path = "config/hypr/scripts/choose-browser.sh" },
  { mode = "755", path = "config/hypr/scripts/choose-editor.sh" },
  { mode = "755", path = "config/hypr/scripts/playing.sh" },
  { mode = "755", path = "config/hypr/scripts/screenshot.sh" },
  { mode = "755", path = "config/hypr/scripts/stocks.sh" },
  { mode = "755", path = "config/volume/init-volume.sh" },
]
