# Manifest file for sparse checkout configuration
# Lists which files belong to exclusion categories: linux, windows, arch, desktop
#
# IMPORTANT: Every non-[base] category section in symlinks.toml must have a
# corresponding section here. The validation task ('dotfiles test') checks this.
#
# Format: paths relative to symlinks/ directory (prefix not included in paths)
# These paths are prefixed with symlinks/ when generating sparse checkout patterns
# Directories should end with /
# Individual files listed explicitly
#
# Section names use hyphen-separated categories and follow AND logic, identical to all other
# config files. A section is excluded only when ALL of its category tags match the excluded set.
# Example: [arch-desktop] is excluded only if BOTH arch AND desktop are excluded.
#
# Note: Files in the [base] profile category do not need to be listed here
# since base files are never excluded - they're included in all profiles.
# Only list files that should be excluded in certain profiles.

# Linux-specific files (excluded on Windows)
[linux]
paths = [
  "bash_profile",
  "bashrc",
  "config/bash/",
  "config/pinentry/",
  "config/powershell/",
  "config/readline/",
  "config/shell/aliases.sh",
  "config/shell/path.sh",
  "config/shell/profile.sh",
  "config/systemd/user/clean-home-tmp.service",
  "config/systemd/user/clean-home-tmp.timer",
  "config/tmux/",
  "config/wgetrc",
  "config/zsh/",
  "gnupg/",
  "vim/",
  "zshenv",
  "zshrc",
]

# Windows-specific files
[windows]
paths = [
  "AppData/",
  "config/git/windows",
  "Documents/",
  "wslconfig",
]

# Arch Linux-specific files
[arch]
paths = [
  "config/pacman.conf",
  "config/paru/",
  "config/zsh/functions/update-mirrors",
]

# Desktop-specific files
[desktop]
paths = [
  "config/Code/",
  "config/Code - Insiders/",
  "config/idea/",
  "config/shell/aliases-desktop.sh",
  "config/shell/profile-desktop.sh",
  "vscode-remote/",
  "local/share/terminfo/",
]

# Desktop-specific files that also require Arch Linux
[arch-desktop]
paths = [
  "config/dunst/",
  "config/flameshot/",
  "config/gtk-2.0/",
  "config/gtk-3.0/",
  "config/lock.sh",
  "config/picom/",
  "config/redshift.conf",
  "config/rofi/",
  "config/shell/profile-arch-desktop.sh",
  "config/systemd/user/dunst.service",
  "config/systemd/user/picom.service",
  "config/systemd/user/redshift.service.d/",
  "config/systemd/user/volume.service",
  "config/systemd/user/wallpaper.service",
  "config/systemd/user/xautolock.service",
  "config/systemd/user/wayland-session.target",
  "config/systemd/user/xsession.target",
  "config/user-dirs.dirs",
  "config/volume/",
  "config/wallpaper/",
  "config/xmonad/",
  "Xdefaults",
  "xinitrc",
  "Xresources",
  "zprofile",
  "local/bin/start-session",
]
