# System packages to install
# Linux: Uses pacman (Arch Linux) with sections like [arch], [arch-desktop]
#   - AUR packages are marked with aur = true
# Windows: Uses winget (Windows Package Manager) with [windows] section
# Sections represent category combinations that must all be active

[arch]
packages = [
  "base-devel",
  "bat",
  "btop",
  "ctags",
  "curl",
  "duf",
  "eza",
  "fd",
  "fzf",
  "git",
  "git-delta",
  "jq",
  "lazygit",
  "man-db",
  "man-pages",
  "neovim",
  "openssh",
  "reflector",
  "ripgrep",
  "rustup",
  "sed",
  "shellcheck",
  "sudo",
  "tmux",
  "vim",
  "wget",
  "xdg-user-dirs",
  "zip",
  "zoxide",
  "zsh",
  "zsh-autosuggestions",
  "zsh-completions",
  "zsh-syntax-highlighting",
  { name = "apm-bin", aur = true },
  { name = "powershell-bin", aur = true },
]

[arch-desktop]
packages = [
  "alacritty",
  "alsa-utils",
  "chromium",
  "mako",
  "gammastep",
  "grim",
  "hyprland",
  "hypridle",
  "hyprlock",
  "hyprpaper",
  "adobe-source-code-pro-fonts",
  "gnome-themes-extra",
  "noto-fonts",
  "noto-fonts-emoji",
  "playerctl",
  "python",
  "uwsm",
  "otf-font-awesome",
  "papirus-icon-theme",
  "qt5-wayland",
  "qt6-wayland",
  "slurp",
  "waybar",
  "wl-clipboard",
  "fuzzel",
  "xorg-xwayland",
  { name = "chromium-widevine", aur = true },
  { name = "spotify", aur = true },
  { name = "visual-studio-code-insiders-bin", aur = true },
]

[windows]
packages = [
  "Chocolatey.Chocolatey",
  "Git.Git",
  "jqlang.jq",
  "Microsoft.APM",
  "Microsoft.PowerShell",
  "Microsoft.Teams",
  "Microsoft.VisualStudioCode.Insiders",
  "Microsoft.WindowsTerminal",
  "OpenJS.NodeJS",
  "Python.Python.3.14",
]
