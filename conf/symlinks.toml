[linux-desktop]
symlinks = [
  "config/Agents - Insiders/User/keybindings.json",
  "config/Agents - Insiders/User/settings.json",
  "config/Agents/User/keybindings.json",
  "config/Agents/User/settings.json",
  "config/Code - Insiders/User/keybindings.json",
  "config/Code - Insiders/User/settings.json",
  "config/Code/User/keybindings.json",
  "config/Code/User/settings.json",
  "config/shell/aliases-desktop.sh",
  "config/shell/profile-desktop.sh",
]

[windows]
symlinks = [
  "config/git/windows",
  "wslconfig",
  { source = "AppData/Local/Packages/Microsoft.WindowsTerminal_8wekyb3d8bbwe/LocalState/settings.json", target = "AppData/Local/Packages/Microsoft.WindowsTerminal_8wekyb3d8bbwe/LocalState/settings.json" },
  { source = "AppData/Roaming/Code - Insiders/User/keybindings.json", target = "AppData/Roaming/Code - Insiders/User/keybindings.json" },
  { source = "AppData/Roaming/Code - Insiders/User/settings.json", target = "AppData/Roaming/Code - Insiders/User/settings.json" },
  { source = "AppData/Roaming/Code/User/keybindings.json", target = "AppData/Roaming/Code/User/keybindings.json" },
  { source = "AppData/Roaming/Code/User/settings.json", target = "AppData/Roaming/Code/User/settings.json" },
  { source = "AppData/Roaming/NuGet/nuget.config", target = "AppData/Roaming/NuGet/nuget.config" },
  { source = "Documents/PowerShell/Microsoft.PowerShell_profile.ps1", target = "Documents/PowerShell/Microsoft.PowerShell_profile.ps1" },
  { source = "Documents/WindowsPowerShell/Microsoft.PowerShell_profile.ps1", target = "Documents/WindowsPowerShell/Microsoft.PowerShell_profile.ps1" },
]
