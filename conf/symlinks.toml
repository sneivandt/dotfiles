# Symlinks to create in $HOME
# Each section represents a category/profile layer
# Target will be ~/.<path>
# Platform categories (linux, windows) are auto-detected; use them to restrict
# symlinks to a specific platform.
#
# IMPORTANT: Every category section here (except [base]) must also appear in
# manifest.toml. The validation task ('dotfiles test') checks this.

[base]
symlinks = [
  "config/git/ai-pr.sh",
  "config/git/aliases",
  "config/git/attributes",
  "config/git/config",
  "config/git/delta",
  "config/git/ignore",
  "config/git/templates",
  "config/nuget/nuget.config",
  "config/powershell/Microsoft.PowerShell_profile.ps1",
  "ssh/config",
]

[linux]
symlinks = [
  "bash_profile",
  "config/nvim",
  "bashrc",
  "config/bash/prompt",
  "config/pinentry/preexec",
  "config/readline/inputrc",
  "config/shell/aliases.sh",
  "config/shell/path.sh",
  "config/shell/profile.sh",
  "config/systemd/user/clean-home-tmp.service",
  "config/systemd/user/clean-home-tmp.timer",
  "config/tmux",
  "config/wgetrc",
  "config/zsh/completion.zsh",
  "config/zsh/completions",
  "config/zsh/functions/docker-clean",
  "config/zsh/functions/extract",
  "config/zsh/functions/ff",
  "config/zsh/functions/ssh-keygen-github",
  "config/zsh/functions/ssh-wsl",
  "config/zsh/key-bindings.zsh",
  "config/zsh/plugins",
  "config/zsh/prompt.zsh",
  "gnupg/gpg-agent.conf",
  "vim",
  "zshenv",
  "zshrc",
]

[arch]
symlinks = [
  "config/pacman.conf",
  "config/paru/paru.conf",
  "config/zsh/functions/update-mirrors",
]

[arch-desktop]
symlinks = [
  "config/alacritty/alacritty.toml",
  "config/chromium/chromium-flags.conf",
  "config/flameshot/flameshot.ini",
  "config/gammastep/config.ini",
  "config/gtk-2.0/gtkrc-2.0",
  "config/gtk-3.0/settings.ini",
  "config/hypr/hyprland.conf",
  "config/hypr/hypridle.conf",
  "config/hypr/hyprlock.conf",
  "config/hypr/hyprpaper.conf",
  "config/hypr/scripts",
  "config/mako/config",
  "config/shell/profile-arch-desktop.sh",
  "config/systemd/user/gammastep.service",
  "config/systemd/user/hypridle.service",
  "config/systemd/user/hyprpaper.service",
  "config/systemd/user/mako.service",
  "config/systemd/user/volume.service",
  "config/systemd/user/waybar.service",
  "config/user-dirs.conf",
  "config/user-dirs.dirs",
  "config/volume",
  "config/wallpaper",
  "config/waybar/config",
  "config/waybar/style.css",
  "config/wofi/config",
  "config/wofi/style.css",
  "zprofile",
]

[desktop]
symlinks = [
  "config/idea/config/codestyles/Custom.xml",
  "config/idea/config/inspection/Custom.xml",
  "config/idea/config/keymaps/Custom.xml",
  "config/idea/config/options/colors.scheme.xml",
  "config/idea/config/options/editor.xml",
  "config/idea/config/options/ide.general.xml",
  "config/idea/config/options/keymap.xml",
  "config/idea/idea.properties",
