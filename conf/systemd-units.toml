# Systemd user units to enable and start
# Each section represents a profile

[linux]
units = [
  "clean-home-tmp.timer",
]

[arch-desktop]
units = [
  "clean-screenshots.timer",
  "gammastep.service",
  "hypridle.service",
  "hyprpaper.service",
  "mako.service",
  "volume.service",
  "waybar.service",
]
