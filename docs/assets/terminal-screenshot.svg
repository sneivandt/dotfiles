  <text x="34" y="100" font-family="Cascadia Mono, JetBrains Mono, SFMono-Regular, Consolas, monospace" font-size="15" xml:space="preserve"><tspan fill="#e2e8f0">$ </tspan><tspan fill="#86efac">dotfiles</tspan><tspan fill="#e2e8f0"> install</tspan></text>
  <text x="34" y="120" font-family="Cascadia Mono, JetBrains Mono, SFMono-Regular, Consolas, monospace" font-size="15" xml:space="preserve"><tspan fill="#64748b">version </tspan><tspan fill="#e2e8f0">v0.1.x</tspan><tspan fill="#64748b"> · profile </tspan><tspan fill="#e2e8f0">desktop</tspan><tspan fill="#64748b"> · Arch Linux</tspan></text>
  <text x="34" y="154" font-family="Cascadia Mono, JetBrains Mono, SFMono-Regular, Consolas, monospace" font-size="15" font-weight="700" xml:space="preserve"><tspan fill="#e2e8f0">Changed</tspan></text>
  <text x="34" y="174" font-family="Cascadia Mono, JetBrains Mono, SFMono-Regular, Consolas, monospace" font-size="15" xml:space="preserve"><tspan fill="#86efac">  Install symlinks</tspan></text>
