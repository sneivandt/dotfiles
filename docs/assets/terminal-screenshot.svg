  <text x="34" y="214" font-family="Cascadia Mono, JetBrains Mono, SFMono-Regular, Consolas, monospace" font-size="15" xml:space="preserve"><tspan fill="#e2e8f0">    linked: ~/.config/nvim -&gt; ./symlinks/config/nvim</tspan></text>
  <text x="34" y="234" font-family="Cascadia Mono, JetBrains Mono, SFMono-Regular, Consolas, monospace" font-size="15" xml:space="preserve"><tspan fill="#e2e8f0">    linked: ~/.gitconfig -&gt; ./symlinks/gitconfig</tspan></text>
  <text x="34" y="254" font-family="Cascadia Mono, JetBrains Mono, SFMono-Regular, Consolas, monospace" font-size="15" xml:space="preserve"><tspan fill="#e2e8f0">    linked: ~/.zshrc -&gt; ./symlinks/zshrc</tspan></text>
  <text x="34" y="278" font-family="Cascadia Mono, JetBrains Mono, SFMono-Regular, Consolas, monospace" font-size="15" xml:space="preserve"><tspan fill="#86efac">  Install packages</tspan></text>
