<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="960" height="438" viewBox="0 0 960 438" role="img" aria-labelledby="title desc">
  <title id="title">dotfiles terminal preview</title>
  <desc id="desc">Compact example of symlinks, packages, and a default shell being installed by the dotfiles CLI.</desc>
  <defs>
    <filter id="shadow" x="-8%" y="-8%" width="116%" height="116%">
      <feDropShadow dx="0" dy="0" stdDeviation="16" flood-color="#16161e" flood-opacity="0.45"/>
    </filter>
  </defs>
  <rect width="100%" height="100%" rx="28" fill="#1a1b26"/>
  <rect x="18" y="18" width="924" height="402" rx="14" fill="#1a1b26" opacity="0.96" filter="url(#shadow)"/>
  <path d="M32 18h896a14 14 0 0 1 14 14v28H18V32a14 14 0 0 1 14-14z" fill="#24283b"/>
  <line x1="18" y1="60" x2="942" y2="60" stroke="#414868" stroke-opacity="0.75"/>
  <circle cx="44" cy="39" r="6" fill="#f7768e"/>
  <circle cx="64" cy="39" r="6" fill="#e0af68"/>
  <circle cx="84" cy="39" r="6" fill="#9ece6a"/>
  <text x="480" y="44" text-anchor="middle" fill="#a9b1d6" font-family="Inter, Segoe UI, system-ui, sans-serif" font-size="13" font-weight="600">user@workstation: ~</text>
  <text x="34" y="80" font-family="Cascadia Mono, JetBrains Mono, SFMono-Regular, Consolas, monospace" font-size="15" xml:space="preserve"><tspan fill="#e0af68">~</tspan></text>
  <text x="34" y="100" font-family="Cascadia Mono, JetBrains Mono, SFMono-Regular, Consolas, monospace" font-size="15" xml:space="preserve"><tspan fill="#c0caf5">$ </tspan><tspan fill="#9ece6a">dotfiles</tspan><tspan fill="#c0caf5"> install</tspan></text>
  <text x="34" y="126" font-family="Cascadia Mono, JetBrains Mono, SFMono-Regular, Consolas, monospace" font-size="15" xml:space="preserve"><tspan fill="#c0caf5">Install · profile desktop · Arch Linux</tspan></text>
  <text x="34" y="158" font-family="Cascadia Mono, JetBrains Mono, SFMono-Regular, Consolas, monospace" font-size="15" xml:space="preserve"><tspan fill="#c0caf5">Install symlinks</tspan></text>
  <text x="34" y="179" font-family="Cascadia Mono, JetBrains Mono, SFMono-Regular, Consolas, monospace" font-size="15" xml:space="preserve"><tspan fill="#c0caf5">  link ~/.config/git/config</tspan></text>
  <text x="34" y="200" font-family="Cascadia Mono, JetBrains Mono, SFMono-Regular, Consolas, monospace" font-size="15" xml:space="preserve"><tspan fill="#c0caf5">  link ~/.config/nvim</tspan></text>
  <text x="34" y="221" font-family="Cascadia Mono, JetBrains Mono, SFMono-Regular, Consolas, monospace" font-size="15" xml:space="preserve"><tspan fill="#c0caf5">  link ~/.zshrc</tspan></text>
  <text x="34" y="253" font-family="Cascadia Mono, JetBrains Mono, SFMono-Regular, Consolas, monospace" font-size="15" xml:space="preserve"><tspan fill="#c0caf5">Install packages</tspan></text>
  <text x="34" y="274" font-family="Cascadia Mono, JetBrains Mono, SFMono-Regular, Consolas, monospace" font-size="15" xml:space="preserve"><tspan fill="#c0caf5">  install neovim</tspan></text>
  <text x="34" y="295" font-family="Cascadia Mono, JetBrains Mono, SFMono-Regular, Consolas, monospace" font-size="15" xml:space="preserve"><tspan fill="#c0caf5">  install ripgrep</tspan></text>
  <text x="34" y="327" font-family="Cascadia Mono, JetBrains Mono, SFMono-Regular, Consolas, monospace" font-size="15" xml:space="preserve"><tspan fill="#c0caf5">Configure default shell</tspan></text>
  <text x="34" y="348" font-family="Cascadia Mono, JetBrains Mono, SFMono-Regular, Consolas, monospace" font-size="15" xml:space="preserve"><tspan fill="#c0caf5">  configure default shell → zsh</tspan></text>
  <text x="34" y="382" font-family="Cascadia Mono, JetBrains Mono, SFMono-Regular, Consolas, monospace" font-size="15" xml:space="preserve"><tspan fill="#c0caf5" font-weight="700">Complete</tspan><tspan fill="#565f89"> · 1.3s</tspan></text>
  <text x="34" y="404" font-family="Cascadia Mono, JetBrains Mono, SFMono-Regular, Consolas, monospace" font-size="15" xml:space="preserve"><tspan fill="#c0caf5">Tasks:</tspan><tspan fill="#9ece6a"> 3 changed</tspan><tspan fill="#565f89"> · </tspan><tspan fill="#c0caf5">Actions:</tspan><tspan fill="#9ece6a"> 6 applied</tspan></text>
