name: dotfiles
version: 1.0.0
dependencies:
  apm:
    # Local plugins
    - ~/.apm/plugins/dot-code
    - ~/.apm/plugins/dot-copilot
    - ~/.apm/plugins/dot-doc
    - ~/.apm/plugins/dot-skill

    # External dependencies are pinned to a specific commit (#<sha>) so that
    # `apm outdated`/`apm deps update` do not treat a moving default branch as
    # perpetually stale and re-clone full repo history on every install. The
    # pinned SHAs are the last known-good revisions already resolved locally;
    # bump them deliberately when adopting upstream changes.

    # .NET tooling (dotnet/skills @ a7a744c, 2026-06-21)
    - dotnet/skills/plugins/dotnet-diag#a7a744ce18951bf30a73769217abbd7165203be9
    - dotnet/skills/plugins/dotnet-msbuild#a7a744ce18951bf30a73769217abbd7165203be9
    - dotnet/skills/plugins/dotnet-upgrade#a7a744ce18951bf30a73769217abbd7165203be9

    # Copilot meta / workflow (github/awesome-copilot @ 251f416, 2026-06-21)
    - github/awesome-copilot/plugins/awesome-copilot#251f416b6d3aa12837b10536e6f9bdd67f482ff7
    - github/awesome-copilot/plugins/context-engineering#251f416b6d3aa12837b10536e6f9bdd67f482ff7
    - github/awesome-copilot/plugins/automate-this#251f416b6d3aa12837b10536e6f9bdd67f482ff7
    - github/awesome-copilot/skills/agent-supply-chain#251f416b6d3aa12837b10536e6f9bdd67f482ff7

    # Planning & process
    - github/awesome-copilot/plugins/project-planning#251f416b6d3aa12837b10536e6f9bdd67f482ff7
    - github/awesome-copilot/plugins/software-engineering-team#251f416b6d3aa12837b10536e6f9bdd67f482ff7

    # Cloud / infrastructure
    - github/awesome-copilot/plugins/azure-cloud-development#251f416b6d3aa12837b10536e6f9bdd67f482ff7

    # Cross-cutting code quality
