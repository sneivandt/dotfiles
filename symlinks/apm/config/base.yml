    - dotnet/skills/plugins/dotnet-upgrade#22575b2ac0094de25490e7336ebad8bb1b4daef8

    # Copilot meta / workflow (github/awesome-copilot @ 90921cc, 2026-05-01)
    - github/awesome-copilot/plugins/awesome-copilot#90921cc46f4e452ea379e70884d60ec25263f16a
    - github/awesome-copilot/plugins/context-engineering#90921cc46f4e452ea379e70884d60ec25263f16a
    - github/awesome-copilot/plugins/automate-this#90921cc46f4e452ea379e70884d60ec25263f16a

