name: dotfiles
version: 1.0.0
dependencies:
  apm:
    # External dependencies are pinned to a specific commit (#<sha>) so that
    # `apm outdated`/`apm deps update` do not treat a moving default branch as
    # perpetually stale and re-clone full repo history on every install. The
    # pinned SHAs are the last known-good revisions already resolved locally;
    # bump them deliberately when adopting upstream changes.

    # .NET tooling (dotnet/skills @ 22575b2, 2026-04-30)
    - dotnet/skills/plugins/dotnet-diag#22575b2ac0094de25490e7336ebad8bb1b4daef8
