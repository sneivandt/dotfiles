# Fuzzel — fixed-geometry, native Wayland app launcher.
#
# Theme: dark, monospaced, terminal-flavoured. Built to match alacritty
# and the Source Code Pro shell prompt.
#
# Palette:
#   bg        #0d1117  (near-black, slight blue tint)
#   border    #30363d
#   fg        #c9d1d9  (soft off-white — easier on the eyes than pure white)
#   muted     #6e7681
#   accent    #58a6ff  (selection / match highlight)

font=Source Code Pro:size=13
prompt=""
icons-enabled=no
terminal=alacritty -e
layer=overlay
exit-on-keyboard-focus-loss=yes
use-bold=yes

# Spacing — generous, calm, breathing room around each row.
horizontal-pad=24
vertical-pad=18
inner-pad=12
line-height=26
letter-spacing=0

# Search behaviour
match-mode=fuzzy
sort-result=yes
filter-desktop=yes
hide-before-typing=no
show-actions=no
match-counter=no

# Geometry — fixed, anchored top-centre.
lines=8
width=46
anchor=top
y-margin=140

[colors]
# Background uses 0xf5 alpha for a hint of translucency over the desktop.
background=0d1117f5
text=c9d1d9ff
prompt=58a6ffff
placeholder=6e7681ff
input=ffffffff
match=58a6ffff
# Selection: subtle translucent accent fill so the row reads as highlighted
# without being shouty. Matched chars within the selected row stay accent.
selection=58a6ff26
selection-text=ffffffff
selection-match=58a6ffff
border=30363dff
counter=6e7681ff

[border]
width=1
radius=12
selection-radius=8

[dmenu]
exit-immediately-if-empty=yes
