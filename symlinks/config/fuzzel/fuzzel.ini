# Fuzzel — fixed-geometry, native Wayland app launcher.
#
# Theme: dark, monospaced, terminal-flavoured. Built to match alacritty
# and the Source Code Pro shell prompt.
#
# Palette:
#   bg        #1a1b26  (TokyoNight Night background)
#   border    #414868
#   fg        #c0caf5
#   muted     #565f89
#   accent    #7aa2f7  (selection / match highlight)

font=Source Code Pro:size=13
prompt=""
icons-enabled=no
terminal=alacritty -e
layer=overlay
exit-on-keyboard-focus-loss=yes
use-bold=yes

# Spacing — generous, calm, breathing room around each row.
horizontal-pad=24
vertical-pad=18
inner-pad=12
line-height=26
letter-spacing=0

# Search behaviour
match-mode=fuzzy
sort-result=yes
filter-desktop=yes
hide-before-typing=no
show-actions=no
match-counter=no

# Geometry — fixed, anchored top-centre.
lines=8
width=46
anchor=top
y-margin=140

[colors]
# Background uses 0xf5 alpha for a hint of translucency over the desktop.
background=1a1b26f5
text=c0caf5ff
prompt=7aa2f7ff
placeholder=565f89ff
input=c0caf5ff
match=7aa2f7ff
# Selection: subtle translucent accent fill so the row reads as highlighted.
selection=7aa2f726
selection-text=c0caf5ff
selection-match=7aa2f7ff
border=414868ff
counter=565f89ff

[border]
width=1
radius=12
selection-radius=8

[dmenu]
exit-immediately-if-empty=yes
