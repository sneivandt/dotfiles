# Tokyo Night palette
general {
    gaps_in = 4
    gaps_out = 8
    border_size = 2
    col.active_border = rgb(7aa2f7) rgb(bb9af7) 45deg
    col.inactive_border = rgb(414868)
    layout = master
    resize_on_border = true
}

# Remove gaps and borders for fullscreen windows
workspace = f[1], gapsout:0, gapsin:0, border:false, rounding:false

decoration {
    rounding = 8
    blur {
        enabled = false
    }
    shadow {
        enabled = true
        range = 12
        render_power = 2
        color = rgba(00000040)
        offset = 0, 2
    }
}

animations {
    enabled = true
    bezier = subtle, 0.25, 0.1, 0.25, 1.0
    bezier = smooth, 0.05, 0.9, 0.1, 1.0

    animation = windows, 1, 3, smooth, slide
    animation = windowsOut, 1, 3, smooth, slide
    animation = fade, 1, 3, smooth
    animation = workspaces, 1, 3, smooth, slide
    animation = border, 1, 8, smooth
    animation = borderangle, 1, 60, subtle, loop
}

master {
    new_status = slave
    mfact = 0.618
}

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    force_default_wallpaper = 0
    render_unfocused_fps = 60
}

ecosystem {
    no_update_news = true
    no_donation_nag = true
}

xwayland {
    force_zero_scaling = true
}
