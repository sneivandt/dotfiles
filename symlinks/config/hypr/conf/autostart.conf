# Long-running session daemons are managed as systemd user services.
# See ~/.config/systemd/user/ for gammastep, hypridle, hyprpaper, mako, volume, waybar.

# Hide waybar when a window goes fullscreen.
exec-once = sh -c 'command -v python3 >/dev/null 2>&1 && [ -x "$HOME/.config/hypr/scripts/fullscreen-waybar.py" ] && exec "$HOME/.config/hypr/scripts/fullscreen-waybar.py"'

# Disable border-resize cursor when the focused window fills the workspace.
exec-once = sh -c 'command -v python3 >/dev/null 2>&1 && [ -x "$HOME/.config/hypr/scripts/resize-on-border.py" ] && exec "$HOME/.config/hypr/scripts/resize-on-border.py"'
