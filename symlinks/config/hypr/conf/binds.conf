$mod = SUPER

# Launch
bind = $mod, Return, exec, alacritty
bind = $mod, p, exec, fuzzel
bind = $mod, o, exec, ~/.config/hypr/scripts/choose-browser.sh
bind = $mod, i, exec, ~/.local/bin/github-copilot
bind = $mod, u, exec, ~/.config/hypr/scripts/choose-editor.sh

# Window management
bind = $mod, q, killactive
bind = $mod, f, fullscreen, 1
bind = $mod SHIFT, f, fullscreenstate, 0 2
bind = $mod, j, layoutmsg, cyclenext
bind = $mod, k, layoutmsg, cycleprev
bind = $mod SHIFT, j, layoutmsg, swapnext
bind = $mod SHIFT, k, layoutmsg, swapprev
bind = $mod, h, resizeactive, -20 0
bind = $mod, l, resizeactive, 20 0
bind = $mod, t, togglefloating,
bind = $mod, comma, layoutmsg, addmaster
bind = $mod, period, layoutmsg, removemaster

# Lock screen
bind = $mod, End, exec, hyprlock

# Screenshot (grim + slurp)
bind = $mod SHIFT, s, exec, ~/.config/hypr/scripts/screenshot.sh

# Workspaces
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9

bind = $mod SHIFT, 1, movetoworkspacesilent, 1
bind = $mod SHIFT, 2, movetoworkspacesilent, 2
bind = $mod SHIFT, 3, movetoworkspacesilent, 3
bind = $mod SHIFT, 4, movetoworkspacesilent, 4
bind = $mod SHIFT, 5, movetoworkspacesilent, 5
bind = $mod SHIFT, 6, movetoworkspacesilent, 6
bind = $mod SHIFT, 7, movetoworkspacesilent, 7
bind = $mod SHIFT, 8, movetoworkspacesilent, 8
bind = $mod SHIFT, 9, movetoworkspacesilent, 9

# Workspace cycling
bind = $mod, Tab, workspace, e+1
bind = $mod SHIFT, Tab, workspace, e-1

# Mouse bindings
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow
