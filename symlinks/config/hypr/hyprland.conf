# Hyprland configuration

# Monitor — use preferred resolution, auto-placement
monitor = , preferred, auto, 1

# Environment variables for Wayland session
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland
env = QT_QPA_PLATFORM,wayland
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = GDK_BACKEND,wayland,x11
env = MOZ_ENABLE_WAYLAND,1
env = XCURSOR_SIZE,24

# Input
input {
    kb_layout = us
    follow_mouse = 1
    sensitivity = 0
}

# General
general {
    gaps_in = 4
    gaps_out = 8
    border_size = 3
    col.active_border = rgb(61afef)
    col.inactive_border = rgb(1a1a1a)
    layout = master
}

# Remove gaps and borders when only one window is on a workspace
workspace = w[tv1], gapsout:0, gapsin:0, border:false
workspace = f[1], gapsout:0, gapsin:0, border:false

# Decoration
decoration {
    rounding = 0
    blur {
        enabled = false
    }
    shadow {
        enabled = false
    }
}

# Animations
animations {
    enabled = false
}

# Master layout
master {
    new_status = slave
    mfact = 0.618
}

# Misc
misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    force_default_wallpaper = 0
}

# XWayland
xwayland {
    force_zero_scaling = true
}

# Autostart
exec-once = waybar
exec-once = dunst
exec-once = hyprpaper
exec-once = hypridle
exec-once = gammastep -c ~/.config/gammastep/config.ini
exec-once = ~/.config/volume/init-volume.sh

# Import systemd environment for portals, etc.
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP

# Keybindings
$mod = SUPER

# Launch
bind = $mod, Return, exec, alacritty
bind = $mod, p, exec, wofi --show drun
bind = $mod, o, exec, ~/.config/hypr/scripts/choose-browser.sh
bind = $mod, i, exec, ~/.config/hypr/scripts/choose-editor.sh

# Window management
bind = $mod, q, killactive,
bind = $mod SHIFT, q, exit,
bind = $mod, f, fullscreen, 0
bind = $mod, j, layoutmsg, cyclenext
bind = $mod, k, layoutmsg, cycleprev
bind = $mod SHIFT, j, layoutmsg, swapnext
bind = $mod SHIFT, k, layoutmsg, swapprev
bind = $mod, h, resizeactive, -20 0
bind = $mod, l, resizeactive, 20 0
bind = $mod, t, togglefloating,
bind = $mod, comma, layoutmsg, addmaster
bind = $mod, period, layoutmsg, removemaster

# Lock screen
bind = $mod, End, exec, hyprlock

# Screenshot (grim + slurp)
bind = $mod SHIFT, s, exec, ~/.config/hypr/scripts/screenshot.sh

# Workspaces
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9

bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9

# Workspace cycling
bind = $mod, Tab, workspace, e+1
bind = $mod SHIFT, Tab, workspace, e-1

# Mouse bindings
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

# Window rules
windowrule = float on, match:class ^(pavucontrol)$
windowrule = float on, match:class ^(flameshot)$
