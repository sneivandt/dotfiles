# Hyprland configuration

# Monitor — use preferred resolution, auto-placement
monitor = , preferred, auto, 1

# Application-specific environment variables
# (Session identity vars — XDG_SESSION_TYPE, XDG_CURRENT_DESKTOP, etc. — are
# owned by the login session via uwsm and must not be overridden here.
# MOZ_ENABLE_WAYLAND and QT_QPA_PLATFORM are set in profile-arch-desktop.sh.)
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = GDK_BACKEND,wayland,x11
env = XCURSOR_SIZE,24

# Input
input {
    kb_layout = us
    follow_mouse = 1
    sensitivity = 0
}

# General
general {
    gaps_in = 4
    gaps_out = 8
    border_size = 2
    col.active_border = rgb(61afef) rgb(b48ead) 45deg
    col.inactive_border = rgb(2a2a2a)
    layout = master
}

# Remove gaps and borders when only one window is on a workspace
workspace = w[tv1], gapsout:0, gapsin:0, border:false, rounding:false
workspace = f[1], gapsout:0, gapsin:0, border:false, rounding:false

# Decoration
decoration {
    rounding = 8
    blur {
        enabled = false
    }
    shadow {
        enabled = true
        range = 12
        render_power = 2
        color = rgba(00000040)
        offset = 0, 2
    }
}

# Animations
animations {
    enabled = true
    bezier = subtle, 0.25, 0.1, 0.25, 1.0
    bezier = smooth, 0.05, 0.9, 0.1, 1.0

    animation = windows, 1, 3, smooth, slide
    animation = windowsOut, 1, 3, smooth, slide
    animation = fade, 1, 3, smooth
    animation = workspaces, 1, 3, smooth, slide
    animation = border, 1, 8, smooth
    animation = borderangle, 1, 60, subtle, loop
}

# Master layout
master {
    new_status = slave
    mfact = 0.618
}

# Misc
misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    force_default_wallpaper = 0
    render_unfocused_fps = 60
}

# XWayland
xwayland {
    force_zero_scaling = true
}

# Autostart — long-running session daemons are managed as systemd user services.
# See ~/.config/systemd/user/ for gammastep, hypridle, hyprpaper, mako, volume, waybar.

# Keybindings
$mod = SUPER

# Launch
bind = $mod, Return, exec, alacritty
bind = $mod, p, exec, wofi --show drun
bind = $mod, o, exec, ~/.config/hypr/scripts/choose-browser.sh
bind = $mod, i, exec, ~/.config/hypr/scripts/choose-editor.sh

# Window management
bind = $mod, q, killactive
bind = $mod, f, fullscreen, 1
bind = $mod SHIFT, f, fullscreenstate, 0 2
bind = $mod, j, layoutmsg, cyclenext
bind = $mod, k, layoutmsg, cycleprev
bind = $mod SHIFT, j, layoutmsg, swapnext
bind = $mod SHIFT, k, layoutmsg, swapprev
bind = $mod, h, resizeactive, -20 0
bind = $mod, l, resizeactive, 20 0
bind = $mod, t, togglefloating,
bind = $mod, comma, layoutmsg, addmaster
bind = $mod, period, layoutmsg, removemaster

# Lock screen
bind = $mod, End, exec, hyprlock

# Screenshot (grim + slurp)
bind = $mod SHIFT, s, exec, ~/.config/hypr/scripts/screenshot.sh

# Workspaces
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9

bind = $mod SHIFT, 1, movetoworkspacesilent, 1
bind = $mod SHIFT, 2, movetoworkspacesilent, 2
bind = $mod SHIFT, 3, movetoworkspacesilent, 3
bind = $mod SHIFT, 4, movetoworkspacesilent, 4
bind = $mod SHIFT, 5, movetoworkspacesilent, 5
bind = $mod SHIFT, 6, movetoworkspacesilent, 6
bind = $mod SHIFT, 7, movetoworkspacesilent, 7
bind = $mod SHIFT, 8, movetoworkspacesilent, 8
bind = $mod SHIFT, 9, movetoworkspacesilent, 9

# Workspace cycling
bind = $mod, Tab, workspace, e+1
bind = $mod SHIFT, Tab, workspace, e-1

# Mouse bindings
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

# Window rules
windowrule = float on, match:class ^(pavucontrol)$
windowrule = render_unfocused on, match:class ^(chromium)$
windowrule = suppress_event maximize, match:class ^(chromium)$
