# Hyprlock — screen locker for Hyprland

auth {
    pam:module = hyprlock-custom
}

background {
    monitor =
    path = ~/.config/wallpaper/default.png
    blur_passes = 3
    blur_size = 8
    noise = 0.02
    brightness = 0.6
}

input-field {
    monitor =
    size = 280, 52
    outline_thickness = 2
    dots_size = 0.28
    dots_spacing = 0.2
    dots_center = true
    outer_color = rgb(61afef)
    inner_color = rgb(1a1a1a)
    font_color = rgb(d0d0d0)
    fade_on_empty = true
    placeholder_text = <span foreground="##888888"><i>Password</i></span>
    hide_input = false
    rounding = 8
    position = 0, -60
    halign = center
    valign = center

    # Feedback colors
    check_color = rgb(61afef)
    fail_color = rgb(e06c75)
    fail_text = <i>$FAIL ($ATTEMPTS)</i>
    capslock_color = rgb(e5c07b)
}

label {
    monitor =
    text = $TIME
    color = rgb(e0e0e0)
    font_size = 72
    font_family = Source Code Pro
    position = 0, 80
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:60000] date +"%-A, %B %-d"
    color = rgb(888888)
    font_size = 16
    font_family = Source Code Pro
    position = 0, 10
    halign = center
    valign = center
}
