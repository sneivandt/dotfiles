# Hyprlock — screen locker for Hyprland

auth {
    pam:module = hyprlock-custom
}

background {
    monitor =
    path = ~/.config/wallpaper/default.png
    blur_passes = 3
    blur_size = 8
    noise = 0.02
    brightness = 0.55
}

input-field {
    monitor =
    size = 280, 52
    outline_thickness = 2
    dots_size = 0.28
    dots_spacing = 0.2
    dots_center = true
    outer_color = rgb(7aa2f7)
    inner_color = rgb(1a1b26)
    font_color = rgb(c0caf5)
    fade_on_empty = true
    placeholder_text = <span foreground="##565f89"><i>Password</i></span>
    hide_input = false
    rounding = 8
    position = 0, -60
    halign = center
    valign = center

    # Feedback colors
    check_color = rgb(7aa2f7)
    fail_color = rgb(f7768e)
    fail_text = <i>$FAIL ($ATTEMPTS)</i>
    capslock_color = rgb(e0af68)
}

label {
    monitor =
    text = $TIME
    color = rgb(c0caf5)
    font_size = 72
    font_family = Source Code Pro
    position = 0, 80
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:60000] date +"%-A, %B %-d"
    color = rgb(9aa5ce)
    font_size = 16
    font_family = Source Code Pro
    position = 0, 10
    halign = center
    valign = center
}
