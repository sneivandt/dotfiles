# Hyprlock — screen locker for Hyprland

general {
    hide_cursor = true
    ignore_empty_input = true
    immediate_render = true
}

auth {
    pam:module = hyprlock
}

# Image backgrounds and animations trigger a DPMS reconnect crash in hyprlock
# 0.9.5 (hyprwm/hyprlock#991). Keep rendering simple until upstream fixes it.
background {
    monitor =
    color = rgb(1a1b26)
}

animations {
    enabled = false
}

input-field {
    monitor =
    size = 280, 52
    outline_thickness = 2
    dots_size = 0.28
    dots_spacing = 0.2
    dots_center = true
    outer_color = rgb(7aa2f7)
    inner_color = rgb(1a1b26)
    font_color = rgb(c0caf5)
    fade_on_empty = true
    placeholder_text = <span foreground="##565f89"><i>Password</i></span>
    hide_input = false
    rounding = 8
    position = 0, -60
    halign = center
    valign = center

    check_color = rgb(7aa2f7)
    fail_color = rgb(f7768e)
    fail_text = <i>$FAIL ($ATTEMPTS)</i>
    capslock_color = rgb(e0af68)
    numlock_color = rgb(e0af68)
    bothlock_color = rgb(f7768e)
}

label {
    monitor =
    text = $TIME
    color = rgb(c0caf5)
    font_size = 72
    font_family = Source Code Pro
    position = 0, 80
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:60000] date +"%-A, %B %-d"
    color = rgb(9aa5ce)
    font_size = 16
    font_family = Source Code Pro
    position = 0, 10
    halign = center
    valign = center
}
